name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "infra/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra rag
      - run: uv run ruff check src tests scripts eval
      - run: uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install -g aws-cdk
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra infra
      - run: uv run cdk deploy --require-approval never --outputs-file cdk-out.json
        working-directory: infra
      - name: Show API URL
        run: jq -r '.CanAID.ApiUrl' infra/cdk-out.json
